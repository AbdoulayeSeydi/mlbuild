version: 1
remotes:
  test-local:
    backend: local
    prefix: mlbuild/
    default: false
    path: /private/tmp/mlbuild-remote
  prod-storage:
    backend: local
    prefix: mlbuild/
    default: false
    path: /private/tmp/mlbuild-prod
  prod:
    backend: s3
    prefix: mlbuild/artifacts/
    default: true
    bucket: my-models-bucket
    region: us-east-1
